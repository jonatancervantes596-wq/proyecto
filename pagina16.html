<!DOCTYPE html>
<div class="container">
  <form action="#" method="post">
            <h2>1. Registro de tu Gato (Felinos Domésticos)</h2>
            <p>Cuéntanos sobre tu compañero de vida para nuestro club de fans.</p>
            
            <div class="form-group">
                <label for="nombreGato">Nombre del felino:</label>
                <input type="text" id="nombreGato" name="nombreGato" placeholder="Ej. Michi, Zeus" required>
            </div>

            <div class="form-group">
                <label for="razaGato">Raza predominante:</label>
                <select id="razaGato" name="razaGato">
                    <option value="mestizo">Mestizo / Común Europeo</option>
                    <option value="siames">Siamés</option>
                    <option value="persa">Persa</option>
                    <option value="bengala">Bengala</option>
                    <option value="angora">Angora</option>
                    <option value="otro">Otra raza</option>
                </select>
            </div>

            <div class="form-group">
                <label>Edad aproximada:</label>
                <div class="radio-group">
                    <label><input type="radio" name="edad" value="cachorro" checked> Cachorro (0-1 año)</label>
                    <label><input type="radio" name="edad" value="adulto"> Adulto (1-7 años)</label>
                    <label><input type="radio" name="edad" value="senior"> Senior (Más de 7 años)</label>
                </div>
            </div>

            <div class="form-group">
                <label for="EmailDueno">Correo del tutor:</label>
                <input type="email" id="EmailDueno" name="EmailDueno" placeholder="tu@correo.com" required>
            </div>

            <button type="submit">Registrar Felino Doméstico</button>
  </form>


        <form action="#" method="post">
            <h2>2. Encuesta: Conocimiento de Grandes Felinos</h2>
            <p>Participa en nuestra investigación sobre la percepción y conservación de felinos salvajes.</p>

            <div class="form-group">
                <label for="felinoFavorito">¿Cuál es tu gran felino salvaje favorito?</label>
                <select id="felinoFavorito" name="felinoFavorito" required>
                    <option value="">-- Selecciona uno --</option>
                    <option value="león">León (Panthera leo)</option>
                    <option value="tigre">Tigre (Panthera tigris)</option>
                    <option value="jaguar">Jaguar (Panthera onca)</option>
                    <option value="leopardo">Leopardo de las nieves</option>
                    <option value="guepardo">Guepardo (Cheetah)</option>
                </select>
            </div>

            <div class="form-group">
                <label>¿Qué hábitats felinos te interesan más? (Selecciona varios)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="habitat" value="selva"> Selvas Tropicales</label>
                    <label><input type="checkbox" name="habitat" value="sabana"> Sabanas y Llanuras</label>
                    <label><input type="checkbox" name="habitat" value="montana"> Montañas y Zonas Frías</label>
                    <label><input type="checkbox" name="habitat" value="desierto"> Desiertos y Zonas Áridas</label>
                </div>
            </div>

          <div class="form-group">
                <label for="comentarios">¿Por qué crees que es importante proteger a los grandes felinos de la extinción?</label>
              <p>
                  <textarea id="comentarios" name="comentarios" rows="4" placeholder="Escribe tu opinión aquí..."></textarea>
            </p>
              <p>&nbsp;</p>
            </div>

            <button type="submit">Enviar Respuestas Salvajes</button>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
        </form>
</div>
